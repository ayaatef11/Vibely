<div class="auth-card">

  <h3>{{ 'FORGOT_PASSWORD.TITLE' | translate }}</h3>

  <input  type="email"
    class="form-control mb-3" [placeholder]="'FORGOT_PASSWORD.EMAIL_PLACEHOLDER' | translate"
    [(ngModel)]="email" >

  <button class="btn button-style w-100" (click)="requestReset()">
    {{ 'FORGOT_PASSWORD.SEND_CODE' | translate }}
  </button>

</div>
