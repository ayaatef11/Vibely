<div class="tab-content px-3">

  <p *ngIf="notifications.length === 0" class="text-muted text-center py-4">
    No notifications yet.
  </p>

  <div *ngFor="let notification of notifications" class="notification-item d-flex align-items-center p-3 border-bottom"
    [class.bg-unread]="!notification.isRead" (click)="markAsRead(notification)" style="cursor: pointer">
 
    <div class="flex-grow-1">
      <div class="notification-text">
        <strong>{{ notification.senderName }}</strong> {{ notification.message }}
      </div>
      <small class="text-muted">{{ notification.createdAt | date: 'short' }}</small>
    </div>

    <!-- Unread dot -->
    <span *ngIf="!notification.isRead" class="unread-dot ms-2" style="width: 10px; height: 10px; padding: 0"></span>
  </div>

</div>
