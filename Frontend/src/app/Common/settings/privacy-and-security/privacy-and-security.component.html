<div class="settings-card card">
    <div class="card-header">
        <h5 class="card-title mb-0">
            <i class="fas fa-shield-alt me-2 text-success"></i>Security Settings
        </h5>
    </div>
    <div class="card-body">
        <div class="settings-item">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h6 class="mb-1">Two-Factor Authentication</h6>
                    <p class="text-muted mb-0 small">Add an extra layer of security to your account</p>
                </div>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" checked>
                </div>
            </div>
        </div>
        <div class="settings-item">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h6 class="mb-1">Login Notifications</h6>
                    <p class="text-muted mb-0 small">Get notified when someone logs into your account</p>
                </div>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox">
                </div>
            </div>
        </div>
        
        <div class="settings-item">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h6 class="mb-1">Session Timeout</h6>
                    <p class="text-muted mb-0 small">Automatically log out after inactivity</p>
                </div>
                <select class="form-select" [(ngModel)]="selectedTimeOut" (change)="changeSessionTimeOut()"style="width: auto;">
                    <option [value]="15">15 minutes</option>
                    <option [value]="30">30 minutes</option>
                    <option [value]="60">1 hour</option>
                    <option [value]="120">2 hours</option>
                </select>
            </div>
        </div>
    </div>
</div>
