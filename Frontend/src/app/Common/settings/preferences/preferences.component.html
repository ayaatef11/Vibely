<div class="settings-card card">

    <div class="card-header">
        <h5 class="card-title mb-0">
            <i class="fas fa-palette me-2 text-success"></i>
            {{ 'PREFERENCES.APPEARANCE' | translate }}
        </h5>
    </div>

    <div class="card-body">

        <div class="mb-3">

            <label class="form-label">
                {{ 'PREFERENCES.THEME' | translate }}
            </label>

            <select
                class="form-select"
                [(ngModel)]="selectedTheme"
                (change)="onThemeChange($event)"
            >

                <option value="light">
                    {{ 'PREFERENCES.LIGHT' | translate }}
                </option>

                <option value="dark">
                    {{ 'PREFERENCES.DARK' | translate }}
                </option>

                <option value="auto">
                    {{ 'PREFERENCES.AUTO' | translate }}
                </option>

            </select>

        </div>

        <div class="mb-3">

            <label class="form-label">
                {{ 'PREFERENCES.LANGUAGE' | translate }}
            </label>

            <select
                class="form-select"
                [(ngModel)]="selectedLanguage"
                (change)="onLanguageChange($event)"
            >

                <option value="en">
                    🇬🇧 {{ 'PREFERENCES.ENGLISH' | translate }}
                </option>

                <option value="ar">
                    🇸🇦 {{ 'PREFERENCES.ARABIC' | translate }}
                </option>

            </select>

        </div>

    </div>

</div>
