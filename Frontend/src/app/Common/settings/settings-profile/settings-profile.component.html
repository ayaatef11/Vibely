<div class="settings-card card">
    <div class="card-header">
        <h5 class="card-title mb-0">
            <i class="fas fa-user me-2 text-success"></i>Profile Information
        </h5>
    </div>
    <div class="card-body">
        <div class="row">
            <div class="col-md-3 text-center">
                <img src="https://picsum.photos/150/150?random=profile" alt="Profile" class="profile-avatar mb-3">
                <div>
                    <button class="btn btn-outline-success btn-sm">Change Photo</button>
                </div>
            </div>
            <div class="col-md-9">
                <form>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" name="fullName" [(ngModel)]="currentUser.fullName">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">User Name</label>
                        <input type="email" class="form-control" name="userName" [(ngModel)]="currentUser.userName">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Bio</label>
                        <textarea class="form-control" rows="3" name="bio" [(ngModel)]="currentUser.bio"></textarea>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="settings-card card">
    <div class="card-header">
        <h5 class="card-title mb-0">
            <i class="fas fa-map-marker-alt me-2 text-success"></i>Location
        </h5>
    </div>

    <div class="card-body">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Country</label>
                <select class="form-select" [(ngModel)]="currentUser.location">
                    <option [ngValue]="null" disabled selected>
                        Select Country
                    </option>
                    <option>United States</option>
                    <option>Canada</option>
                    <option>United Kingdom</option>
                </select>
            </div>
        </div>
    </div>
    <div>
        <button class="btn btn-success sm-3" (click)="editProfile()">Save </button>
    </div>
</div>
