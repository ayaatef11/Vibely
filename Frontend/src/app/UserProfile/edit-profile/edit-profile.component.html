<div class="container">
    <!-- HEADER -->
    <div class="profile-header">
        <h2>{{ 'EDIT_PROFILE.TITLE' | translate }}</h2>
        <button type="button" class="btn button-style btn-save" (click)="editProfile()">
            {{ 'COMMON.SAVE' | translate }}
        </button>
    </div>

    <!-- FORM -->
    <div class="profile-form">
        <!-- FORM -->
        <form>
            <!-- NAME -->
            <div class="mb-3">
                <label for="name" class="form-label"> {{ 'EDIT_PROFILE.NAME' | translate }} </label>
                <input type="text" class="form-control" name="fullName" [(ngModel)]="user.fullName">
            </div>

            <!-- USERNAME -->
            <div class="mb-3">
                <label for="username" class="form-label"> {{ 'EDIT_PROFILE.USERNAME' | translate }} </label>
                <input type="text" class="form-control" name="username" [(ngModel)]="user.userName">
            </div>

            <!-- BIO -->
            <div class="mb-3">
                <label for="bio" class="form-label">
                    {{ 'EDIT_PROFILE.BIO' | translate }}
                </label>
                <input type="text"  class="form-control" name="bio"  [(ngModel)]="user.bio">
            </div>

            <!-- LOCATION -->
            <div class="mb-3">
                <label for="location" class="form-label"> {{ 'EDIT_PROFILE.LOCATION' | translate }} </label>
                <input  type="text" class="form-control" name="location" [(ngModel)]="user.location">
            </div>

            <!-- WEBSITE -->
            <div class="mb-4">

                <label for="website" class="form-label">
                    {{ 'EDIT_PROFILE.WEBSITE' | translate }}
                </label>
             <input type="text"  class="form-control"  name="website" [(ngModel)]="user.website">
            </div>
        </form>
    </div>
</div>
