<div class="create-post-modal">

    <!-- HEADER -->
    <div class="modal-header-custom">

        <button class="back-btn" onclick="goBack()">
            <i class="fas fa-arrow-left"></i>
        </button>

        <h5 class="modal-title-custom">
            {{ 'CREATE_POST.TITLE' | translate }}
        </h5>

        <button class="close-btn" onclick="closeModal()">
            <i class="fas fa-times"></i>
        </button>

    </div>

    <div class="post-content">

        <!-- USER INFO -->
        <div class="user-info">

            <img [src]="'https://picsum.photos/40'"
                 alt="User"
                 class="user-avatar">

            <div class="user-details">

                <h6>{{ currentUser.fullName }}</h6>

                <!-- FEELINGS -->
                <select
                    class="privacy-dropdown form-select form-select-sm"
                    [(ngModel)]="post.feelingState"
                    style="color:var(--logo-bubble-dark);">

                    <option [value]="1">
                        😊 {{ 'CREATE_POST.HAPPY' | translate }}
                    </option>

                    <option [value]="2">
                        😢 {{ 'CREATE_POST.SAD' | translate }}
                    </option>

                    <option [value]="3">
                        😍 {{ 'CREATE_POST.EXCITED' | translate }}
                    </option>

                    <option [value]="4">
                        😡 {{ 'CREATE_POST.ANGRY' | translate }}
                    </option>

                    <option [value]="5">
                        😐 {{ 'CREATE_POST.NEUTRAL' | translate }}
                    </option>

                </select>

            </div>

        </div>

        <!-- TITLE -->
        <input
            type="text"
            class="form-control border-0 bg-light mb-2"
            [placeholder]="'CREATE_POST.POST_TITLE' | translate"
            [(ngModel)]="post.title"
            style="border-radius: 12px;">

        <!-- TEXT -->
        <textarea
            class="post-textarea"
            [placeholder]="'CREATE_POST.WHATS_ON_YOUR_MIND' | translate"
            [(ngModel)]="post.text"
            maxlength="500">
        </textarea>

        <div class="char-counter">
            {{ post.text.length || 0 }} / 500
        </div>

        <!-- PREVIEW -->
        <div class="uploaded-media" *ngIf="newPostImagePreview">

            <img [src]="newPostImagePreview" alt="Uploaded content">

            <button class="remove-media" (click)="removeImage()">
                <i class="fas fa-times"></i>
            </button>

        </div>

        <!-- UPLOAD -->
        <div class="media-upload-area" (click)="fileInput.click()">

            <div class="upload-icon">
                <i class="fas fa-images"></i>
            </div>

            <p class="upload-text">
                {{ 'CREATE_POST.ADD_MEDIA' | translate }}
            </p>

            <p class="upload-subtext">
                {{ 'CREATE_POST.DRAG_DROP' | translate }}
            </p>

        </div>

        <!-- FILE INPUT -->
        <input
            type="file"
            #fileInput
            accept="image/*,video/*"
            style="display: none;"
            (change)="onImageSelected($event)">

        <!-- OPTIONS -->
        <div class="post-options">

            <button class="option-btn photo" (click)="fileInput.click()">

                <i class="fas fa-images"></i>

                <span>
                    {{ 'CREATE_POST.PHOTO_VIDEO' | translate }}
                </span>

            </button>

            <button class="option-btn tag">

                <i class="fas fa-user-tag"></i>

                <span>
                    {{ 'CREATE_POST.TAG_PEOPLE' | translate }}
                </span>

            </button>

            <button class="option-btn feeling">

                <i class="fas fa-smile"></i>

                <span>
                    {{ 'CREATE_POST.FEELING_ACTIVITY' | translate }}
                </span>

            </button>

        </div>

        <!-- ACTIONS -->
        <div class="post-actions">

            <button class="btn-cancel" (click)="closeModal()">
                {{ 'COMMON.CANCEL' | translate }}
            </button>

            <button
                class="btn-post"
                [disabled]="!post.text.trim()"
                (click)="addPost()">

                {{ 'COMMON.POST' | translate }}

            </button>

        </div>

    </div>

</div>
