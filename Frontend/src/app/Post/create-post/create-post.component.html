<div class="create-post-modal">
    <div class="modal-header-custom">
        <button class="back-btn" onclick="goBack()">
            <i class="fas fa-arrow-left"></i>
        </button>
        <h5 class="modal-title-custom">Create Post</h5>
        <button class="close-btn" onclick="closeModal()">
            <i class="fas fa-times"></i>
        </button>
    </div>

    <div class="post-content">
        <div class="user-info">
            <img [src]="'https://picsum.photos/40'" alt="User" class="user-avatar">
            <div class="user-details">
                <h6>{{currentUser.fullName}}</h6>
                <!-- Feeling Dropdown replacing privacy -->
                <select class="privacy-dropdown form-select form-select-sm" [(ngModel)]="post.feelingState" style="color:var(--logo-bubble-dark);">
                    <option [value]="1">😊 Happy</option>
                    <option [value]="2">😢 Sad</option>
                    <option [value]="3">😍 Excited</option>
                    <option [value]="4">😡 Angry</option>
                    <option [value]="5">😐 Neutral</option>
                </select>
            </div>
        </div>

        <input type="text" class="form-control border-0 bg-light mb-2" placeholder="Title"
            [(ngModel)]="post.title" style="border-radius: 12px;">

        <!-- Text -->
        <textarea class="post-textarea" placeholder="What's on your mind?" [(ngModel)]="post.text" maxlength="500">
    </textarea>
        <div class="char-counter">{{ post.text.length || 0 }} / 500</div>
        <div class="uploaded-media" *ngIf="newPostImagePreview">
            <img [src]="newPostImagePreview" alt="Uploaded content">
            <button class="remove-media" (click)="removeImage()">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <div class="media-upload-area" (click)="fileInput.click()">
            <div class="upload-icon">
                <i class="fas fa-images"></i>
            </div>
            <p class="upload-text">Add photos/videos</p>
            <p class="upload-subtext">or drag and drop</p>
        </div>

        <!-- Hidden File Input -->
        <input type="file" #fileInput accept="image/*,video/*" style="display: none;"
            (change)="onImageSelected($event)">

        <!-- Post Options -->
        <div class="post-options">
            <button class="option-btn photo" (click)="fileInput.click()">
                <i class="fas fa-images"></i>
                <span>Photo/video</span>
            </button>
            <button class="option-btn tag">
                <i class="fas fa-user-tag"></i>
                <span>Tag people</span>
            </button>
            <button class="option-btn feeling">
                <i class="fas fa-smile"></i>
                <span>Feeling/activity</span>
            </button>
        </div>

        <!-- Actions -->
        <div class="post-actions">
            <button class="btn-cancel" (click)="closeModal()">Cancel</button>
            <button class="btn-post" [disabled]="!post.text.trim()" (click)="addPost()">
                Post
            </button>
        </div>

    </div>
</div>
